<!DOCTYPE html>
<!-- login.html: صفحة تسجيل دخول لوحة التحكم. -->
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — لوحة التحكم</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .login-wrap { max-width: 360px; margin: 4rem auto; padding: 0 1rem; }
    .login-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; box-shadow: var(--shadow); }
    .login-card h2 { margin-top: 0; }
    .login-card label { display: flex; flex-direction: column; margin-bottom: 0.75rem; font-size: 0.9rem; }
    .login-card input { padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 0.95rem; }
    .login-back { display: block; margin-top: 0.75rem; text-align: center; color: var(--accent); text-decoration: none; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h2>تسجيل الدخول</h2>
      <form id="login-form">
        <label>
          اسم المستخدم
          <input id="username" type="text" autocomplete="username" required />
        </label>
        <label>
          كلمة المرور
          <input id="password" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="btn btn-primary">دخول</button>
        <div id="login-error" class="error-msg" style="margin-top:0.75rem;"></div>
        <a href="../index.html" class="login-back">← العودة للصفحة العامة</a>
      </form>
    </div>
  </div>
  <!-- ذيل الصفحة -->
  <footer class="site-footer">
    &copy; 2026 نظام مراقبة أجهزة الشبكة — جميع الحقوق محفوظة
  </footer>
  <script src="../js/admin-login.js"></script>
</body>
</html>
