# =========================================================
# nginx network-monitor — Reverse Proxy اختياري
# ضع هذا الملف في: /etc/nginx/sites-available/network-monitor
# ثم فعّله: sudo ln -s /etc/nginx/sites-available/network-monitor /etc/nginx/sites-enabled/
# اختبار:  sudo nginx -t
# إعادة:   sudo systemctl reload nginx
# =========================================================

server {
    listen 80;
    server_name monitor.yourcompany.com;  # عدّله لدومين شركتك أو IP السيرفر

    # لو أردت HTTPS لاحقاً، استخدم certbot:
    #   sudo certbot --nginx -d monitor.yourcompany.com

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # دعم WebSocket (مستقبلي) وsessions cookies
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
