# CI/CD Pipeline — Network Monitor (بدون Docker)
# فحص الكود + اختبار صحة الخادم + نشر اختياري عبر SSH + إشعارات Discord
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "fix/**", "feat/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PORT: '4000'

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1) فحص الكود + اختبار صحة الخادم
  # ─────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Health Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies (better-sqlite3 native build)
        run: npm ci
        env:
          # بناء better-sqlite3 من المصدر على النظام المستهدف
          npm_config_build_from_source: 'true'

      - name: 🔍 Syntax check — all source files (node --check)
        run: |
          set -e
          echo "::group::فحص قواعد JavaScript syntax لكل ملفات src/"
          status=0
          # العثور على كل ملفات .js داخل src/ وفحصها بـ node --check
          find src -name '*.js' -type f | sort | while read -r file; do
            if node --check "$file" 2>err.log; then
              echo "  ✓ $file"
            else
              echo "  ✗ $file"
              cat err.log
              status=1
            fi
            rm -f err.log
          done
          exit $status

      - name: 🗄️ Initialize database for health test
        run: |
          cd ..
          mkdir -p database
          sqlite3 database/monitoring.db < database/schema.sql
          # إنشاء مدير افتراضي للتشغيل
          cd backend
          node src/seedAdmin.js

      - name: 🩺 Health check — run server & probe /api/health
        run: |
          set -e
          echo "::group::تشغيل الخادم وفحص /api/health"
          # تشغيل الخادم في الخلفية
          PORT=${PORT} node src/server.js > server.log 2>&1 &
          SERVER_PID=$!

          # انتظار حتى يستجيب الخادم (مع مهلة 30 ثانية)
          for i in $(seq 1 60); do
            if curl --silent --fail http://localhost:${PORT}/api/health > health.json 2>/dev/null; then
              echo "✅ الخادم استجاب عند المحاولة #$i"
              cat health.json
              echo ""
              # التحقق من محتوى الاستجابة
              if grep -q '"success":true' health.json; then
                echo "✅ فحص الصحة ناجح: {success:true, data:ok}"
                kill $SERVER_PID 2>/dev/null || true
                wait $SERVER_PID 2>/dev/null || true
                exit 0
              fi
            fi
            sleep 0.5
          done

          # فشل الوصول للخادم
          echo "❌ الخادم لم يستجب خلال 30 ثانية"
          echo "::group::سجلات الخادم"
          cat server.log || true
          echo "::endgroup::"
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          exit 1

      - name: 📤 Upload server logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            backend/server.log
            backend/health.json
          if-no-files-found: ignore
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 2) النشر الاختياري على سيرفر الإنتاج عبر SSH (PM2)
  #    يعمل فقط عند: push على main + وجود SERVER_HOST secret
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production (SSH + PM2)
    needs: lint-and-test
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.SERVER_HOST != ''

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd /opt/network-monitor 2>/dev/null || {
              echo "❌ /opt/network-monitor غير موجود — نفّذ deploy.sh install أولاً على السيرفر"
              exit 1
            }
            echo "📥 سحب أحدث التغييرات من main..."
            git fetch origin main
            git reset --hard origin/main
            cd backend
            echo "📦 تحديث التبعيات (إنتاج فقط)..."
            npm ci --omit=dev
            echo "🔄 إعادة تشغيل PM2..."
            pm2 restart network-monitor --update-env
            pm2 save
            echo "✅ النشر اكتمل"

  # ─────────────────────────────────────────────────────────────
  # 3) إشعارات Discord (دائمًا — نجاح/فشل)
  # ─────────────────────────────────────────────────────────────
  notify:
    name: Discord Notification
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📢 Notify Discord
        # يعمل فقط إذا أُعدّ secret DISCORD_WEBHOOK على المستودع
        if: ${{ secrets.DISCORD_WEBHOOK != '' }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: ${{ github.workflow }}
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.event.head_commit.message }}
            **Author:** ${{ github.actor }}
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: ${{ job.status == 'success' && 0x57F287 || 0xED4245 }}
