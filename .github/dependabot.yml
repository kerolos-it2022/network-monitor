version: 2
updates:
  # ─────────────────────────────────────────────────────────────
  # تبعات backend npm (شامل الإنتاج والتطوير)
  # ─────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 10
    reviewers:
      - "kerolos-it2022"
    assignees:
      - "kerolos-it2022"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps): "
      include: "scope"
    groups:
      dev-dependencies:
        patterns:
          - "*"
        dependency-type: "development"
      production-dependencies:
        patterns:
          - "*"
        dependency-type: "production"

  # ─────────────────────────────────────────────────────────────
  # تحديثات GitHub Actions المستخدمة في workflows/ (checkout, setup-node, ...)
  # ─────────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 5
    reviewers:
      - "kerolos-it2022"
    assignees:
      - "kerolos-it2022"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci"
    commit-message:
      prefix: "ci(deps): "
      include: "scope"
