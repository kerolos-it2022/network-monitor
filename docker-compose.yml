# =========================================================
# docker-compose.yml لنشر نظام مراقبة أجهزة الشبكة
# يوفّر: حاوية الخادم + volume دائم لقاعدة البيانات + إعادة تشغيل تلقائي
# =========================================================
services:
  network-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: network-monitor:latest
    container_name: network-monitor
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-4000}:4000"
    environment:
      # مصدر الإعدادات: ملف .env على المضيف
      NODE_ENV: production
      PORT: 4000
      DB_PATH: /app/data/monitoring.db
      SESSION_SECRET: ${SESSION_SECRET:-please-change-this-secret}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-ChangeMe123!}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN:-}
      WHATSAPP_TO_NUMBER: ${WHATSAPP_TO_NUMBER:-}
    volumes:
      # قاعدة البيانات الدائمة: لو حُذفت/أُعيد بناء الحاوية، البيانات تبقى.
      - nm-data:/app/data
    # وضع network=host ضروري على لينكس لتمكين البوت من فحص أجهزة الشبكة المحلية بـ ICMP/ping.
    # ملاحظة: على Docker Desktop (ويندوز/ماك) سيعمل في وضع bridge عادي (للتطوير فقط).
    network_mode: host

volumes:
  nm-data:
    driver: local
