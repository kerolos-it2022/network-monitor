# =========================================================
# nginx — Network Monitor Reverse Proxy
# الملف: /etc/nginx/sites-available/network-monitor
# تفعيل: sudo ln -s /etc/nginx/sites-available/network-monitor /etc/nginx/sites-enabled/
# اختبار: sudo nginx -t
# إعادة: sudo systemctl reload nginx
# =========================================================

# إعادة توجيه HTTP إلى HTTPS (اختياري - فعّله بعد تثبيت الشهادة)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # عدّل هذا لأي IP أو دومين تريده
    server_name _;

    client_max_body_size 10m;

    # سجلات الوصول والأخطاء
    access_log /var/log/nginx/network-monitor-access.log;
    error_log  /var/log/nginx/network-monitor-error.log;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # دعم WebSocket (مستقبلي) و sessions
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}